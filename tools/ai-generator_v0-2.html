<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>硬件通天塔 - 工业级节点工作站 V5.3</title>
    <style>
        body { margin: 0; padding: 20px; background: #0f0f13; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        h1, h2, h3, h4 { color: #1cb0f6; margin-top: 0; }
        .container { max-width: 1600px; margin: 0 auto; display: flex; gap: 20px; align-items: flex-start;}
        .panel { background: #18181c; border: 1px solid #333; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .left-panel { flex: 1.5; }
        .right-panel { flex: 1; position: sticky; top: 20px; }
        .terminal { background: #050505; border: 2px solid #58cc02; border-radius: 8px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 13px; color: #58cc02; overflow-y: auto; height: 800px; line-height: 1.5; box-shadow: inset 0 0 15px rgba(88,204,2,0.1); word-wrap: break-word; white-space: pre-wrap; }
        
        label { font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 4px; display: block; }
        input, textarea, select { background: #111; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: inherit; transition: border 0.2s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #1cb0f6; box-shadow: 0 0 8px rgba(28,176,246,0.3); }
        button { background: #9b59b6; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 0 #732d91; }
        button:hover:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #732d91; }
        button:disabled { background: #444; box-shadow: 0 4px 0 #222; cursor: not-allowed; color: #888; transform: none; }
        
        .btn-green { background: #58cc02; box-shadow: 0 4px 0 #46a302; } .btn-green:hover:not(:disabled) { box-shadow: 0 2px 0 #46a302; }
        .btn-blue { background: #1cb0f6; box-shadow: 0 4px 0 #1899d6; } .btn-blue:hover:not(:disabled) { box-shadow: 0 2px 0 #1899d6; }
        .btn-red { background: #ff4b4b; box-shadow: 0 4px 0 #cc3c3c; } .btn-red:hover:not(:disabled) { box-shadow: 0 2px 0 #cc3c3c; }
        .row { display: flex; gap: 15px; align-items: flex-end; } .row > div { flex: 1; }
        
        .workflow-container { display: flex; flex-direction: column; gap: 20px; padding: 10px 0; }
        .node-card { background: #222226; border: 1px solid #444; border-left: 5px solid #555; border-radius: 8px; display: flex; flex-direction: column; position: relative; transition: all 0.3s; }
        .node-header { display: flex; justify-content: space-between; align-items: center; background: #1a1a1d; padding: 12px 15px; border-top-left-radius: 8px; border-top-right-radius: 8px; border-bottom: 1px solid #333; }
        .node-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .node-actions { display: flex; gap: 8px; align-items: center; }
        .node-actions button { padding: 5px 10px; font-size: 12px; box-shadow: none; border-radius: 4px; margin: 0; }
        
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .status-IDLE { background: #333; color: #aaa; }
        .status-RUNNING { background: rgba(28, 176, 246, 0.2); color: #1cb0f6; border: 1px solid #1cb0f6; animation: pulse 1.5s infinite; }
        .status-SUCCESS { background: rgba(88, 204, 2, 0.2); color: #58cc02; border: 1px solid #58cc02; }
        .status-ERROR { background: rgba(255, 75, 75, 0.2); color: #ff4b4b; border: 1px solid #ff4b4b; }
        
        .type-EXPAND { border-left-color: #ffc800; }
        .type-GEN { border-left-color: #1cb0f6; }
        .type-MAP { border-left-color: #9b59b6; }

        details.io-panel { background: #111; border: 1px solid #333; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        details.io-panel summary { background: #1a1a1d; padding: 10px 15px; font-size: 13px; font-weight: bold; color: #1cb0f6; cursor: pointer; user-select: none; outline: none; }
        details.io-panel summary:hover { background: #222; }
        .io-content { padding: 15px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #333; }
        .io-content textarea { font-family: 'Courier New', Courier, monospace; font-size: 13px; background: #050505; color: #a6e22e; border: 1px solid #444; }
        .io-content textarea.output-area { color: #e6db74; border-color: #58cc02; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(28,176,246,0.4); } 70% { box-shadow: 0 0 0 6px rgba(28,176,246,0); } 100% { box-shadow: 0 0 0 0 rgba(28,176,246,0); } }
    </style>
</head>
<body>
    <h1 style="text-align: center; letter-spacing: 2px;">⚙️ 通天塔 V5.3：工业级节点工作站</h1>

    <div class="container">
        <div class="panel left-panel">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>1. 全局配置与工作流持久化 (Workflow I/O)</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-blue" onclick="exportWorkflowFile()" style="background:#2ecc71; box-shadow: 0 4px 0 #27ae60;">📤 导出工作流 (.htflow)</button>
                    <button class="btn-blue" onclick="document.getElementById('fileWorkflow').click()" style="background:#e67e22; box-shadow: 0 4px 0 #d35400;">📥 导入工作流</button>
                    <input type="file" id="fileWorkflow" accept=".json" style="display:none;" onchange="importWorkflowFile(event)">
                </div>
            </div>
            
            <div class="row">
                <div><label>API Base URL</label><input type="text" id="apiUrl" value="https://api.deepseek.com/v1/chat/completions"></div>
                <div><label>模型名称 (Model)</label><input type="text" id="apiModel" value="deepseek-chat"></div>
                <div><label>API Key (导出时自动脱敏剥离)</label><input type="password" id="apiKey" placeholder="sk-..."></div>
            </div>

            <div class="row">
                <div style="flex: 0.5"><label>API冷却(秒)</label><input type="number" id="apiDelay" value="3" min="0" max="60"></div>
                <div><label>基础题库 (.md) [可选]</label><input type="file" id="fileMd" accept=".md" style="padding: 6px;"></div>
                <div><label>基础地图 (.json) [可选]</label><input type="file" id="fileJson" accept=".json" style="padding: 6px;"></div>
            </div>

            <hr style="border: 0; border-top: 1px solid #333; margin: 5px 0;">

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>2. 节点矩阵 (Node Graph)</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-green" onclick="addNode('EXPAND')" style="background:#ffc800; color:#000; box-shadow: 0 4px 0 #cc9f00;">+ 知识扩写节点</button>
                    <button class="btn-green" onclick="addNode('GEN')" style="background:#1cb0f6; box-shadow: 0 4px 0 #1899d6;">+ 出题生产节点</button>
                    <button class="btn-green" onclick="addNode('MAP')" style="background:#9b59b6; box-shadow: 0 4px 0 #732d91;">+ 战役地图节点</button>
                </div>
            </div>

            <div class="workflow-container" id="workflowList"></div>

            <div style="display: flex; gap: 15px; margin-top: 15px;">
                <button id="btnStartAll" class="btn-green" style="flex: 2; padding: 15px; font-size: 18px;" onclick="runAllNodes()">▶ 启动流水线 (执行所有 IDLE 节点)</button>
                <button id="btnDownload" class="btn-blue" style="flex: 1; display: none; padding: 15px; font-size: 18px;" onclick="downloadArtifacts()">📦 缝合并导出游戏资产包</button>
            </div>
        </div>

        <div class="panel right-panel">
            <h2>🖥️ 引擎监控终端</h2>
            <div class="terminal" id="terminal">
                <div>[System] V5.3 系统初始化完毕。脱水/补水功能已就绪。</div>
                <div style="color: #555;">===========================================================</div>
            </div>
        </div>
    </div>

    <script>
        const PRESETS = {
            "EXPAND_BASIC": { name: "基础教材扩充", prompt: "请扩充以下知识大纲。要求极度深入，包含底层物理原理、寄生参数陷阱、PCB布线取舍。字数不少于 3000 字。严禁出题，仅输出教材文本。" },
            "GEN_CONCEPT": { name: "阶段一：概念做中学", prompt: "【指令】出纯粹的概念选择题(MCQ)或填空题(BLANK_FILL)。把完整的知识点和定义直接写在题干内当做教学，末尾提问。重点是记忆，不要考倒用户。" },
            "GEN_DIRECT": { name: "阶段二：直接提问篇", prompt: "【指令】出直接提问式的单选题(MCQ)。地毯式覆盖知识点。选项清晰明了，干扰项为明显的常识错误。" },
            "GEN_TRAP": { name: "阶段三：陷阱提高篇", prompt: "【指令】出高难度的完形填空(BLANK_FILL)或多选题(MCQ)。在长题干中挖3-5个空，提供7-10个带相似名词陷阱的选项池。考察易混淆概念。" },
            "GEN_CALC": { name: "阶段四：计算拆解篇", prompt: "【指令】出计算题(MATH)或计算类(MCQ)。不直接给全参数，要求从间接信息推导。复杂公式必须拆解成连续的几道题分别计算不同原子步骤。" },
            "GEN_COMP": { name: "阶段五：综合沙盘篇", prompt: "【指令】出极其复杂的沙盘题(COMPREHENSIVE)。题干极长(>200字)，模拟多因素耦合的真实故障环境。必须配置精准的[Keywords]用于本地判分。" },
            "MAP_DEFAULT": { name: "教研总监级地图编排", prompt: "你是一位顶尖的硬件教研总监。请仔细分析投喂的题目数据，组织成游戏地图。基础概念题放在前排 LESSON，带有复杂推导的综合题作为关底压轴。每2-3个节点后插入 1 个 CHEST（宝箱）。" }
        };

        const DOM = { list: document.getElementById('workflowList'), term: document.getElementById('terminal'), btnStartAll: document.getElementById('btnStartAll'), btnDownload: document.getElementById('btnDownload'), fileMd: document.getElementById('fileMd'), fileJson: document.getElementById('fileJson') };

        // 统一数据总线
        let nodes = [];
        let globalState = { oldQuestions: "", oldCampaign: [], startQID: 600001, startLevelID: 0 };

        function log(msg, type = 'info', rawDump = null) {
            const div = document.createElement('div'); const time = new Date().toLocaleTimeString();
            if (type === 'error') { div.className = 'log-error'; msg = `[ERROR] ${msg}`; }
            else if (type === 'warn') { div.className = 'log-warn'; msg = `[WARN] ${msg}`; }
            else if (type === 'success') { div.className = 'log-success'; msg = `[SUCCESS] ${msg}`; }
            else if (type === 'stage') { div.className = 'log-stage'; msg = `>>> ${msg}`; }
            else msg = `[INFO] ${msg}`;
            div.innerText = `[${time}] ${msg}`;
            if (rawDump) {
                const dumpDiv = document.createElement('div');
                dumpDiv.style.cssText = "background:#222; color:#aaa; padding:10px; border-radius:4px; border-left:3px solid #ff4b4b; font-size:12px; margin-top:5px; max-height:200px; overflow-y:auto;";
                dumpDiv.innerText = `👇 原始数据 Dump:\n${rawDump}`;
                div.appendChild(dumpDiv);
            }
            DOM.term.appendChild(div); DOM.term.scrollTop = DOM.term.scrollHeight;
        }
        const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

        function createNode(type) {
            const id = Date.now().toString();
            let newNode = { id, type, status: 'IDLE', retryCount: 3, delaySec: 2, prompt: '', inputData: '', outputData: '', errorLog: '' };
            if (type === 'EXPAND') { newNode.title = "知识扩写 (EXPAND)"; newNode.presetKey = 'EXPAND_BASIC'; newNode.prompt = "在这里输入你的种子知识点纲要..."; }
            else if (type === 'GEN') { newNode.title = "出题生产 (GEN)"; newNode.presetKey = 'GEN_CONCEPT'; newNode.targetCount = 10; newNode.chunkSize = 5; newNode.prompt = PRESETS['GEN_CONCEPT'].prompt; }
            else if (type === 'MAP') { newNode.title = "战役编排 (MAP)"; newNode.presetKey = 'MAP_DEFAULT'; newNode.prompt = PRESETS['MAP_DEFAULT'].prompt; newNode.payloadMode = 'FULL'; newNode.rangeStart = ''; newNode.rangeEnd = ''; }
            return newNode;
        }

        function addNode(type) { nodes.push(createNode(type)); renderNodes(); }
        function removeNode(idx) { nodes.splice(idx, 1); renderNodes(); }
        function moveNode(idx, dir) { const temp = nodes[idx]; nodes[idx] = nodes[idx + dir]; nodes[idx + dir] = temp; renderNodes(); }
        
        function updateNode(idx, field, value) { 
            nodes[idx][field] = value; 
            if(field === 'presetKey' && PRESETS[value]) { nodes[idx].prompt = PRESETS[value].prompt; }
            if(['prompt', 'targetCount', 'chunkSize', 'outputData', 'payloadMode', 'rangeStart', 'rangeEnd'].includes(field)) {
                nodes[idx].status = 'IDLE'; 
            }
            renderNodes();
            saveLocalCache(); // 任何修改自动存本地草稿
        }

        // 🌟 物理切片助手：一键扫全盘范围
        function scanAllForMap(idx) {
            let allIds = [];
            nodes.filter(n => n.type === 'GEN' && n.outputData).forEach(n => {
                const matches = [...n.outputData.matchAll(/#\s*Q(\d+)/g)];
                matches.forEach(m => allIds.push(parseInt(m[1])));
            });
            if(allIds.length === 0) return alert("前方没有找到任何生成的题目！");
            const min = Math.min(...allIds); const max = Math.max(...allIds);
            nodes[idx].rangeStart = `Q${min}`; nodes[idx].rangeEnd = `Q${max}`;
            updateNode(idx, 'status', 'IDLE'); 
            log(`已自动提取全局切片范围: Q${min} ~ Q${max}`, 'info');
        }

        function renderNodes() {
            DOM.list.innerHTML = '';
            if (nodes.length === 0) { DOM.list.innerHTML = '<div style="color:#666; text-align:center; padding: 20px;">工作流为空。请点击上方按钮添加节点。</div>'; return; }

            nodes.forEach((n, idx) => {
                const el = document.createElement('div');
                el.className = `node-card type-${n.type}`;
                el.id = `node-${n.id}`;

                let configHtml = '';
                if (n.type === 'EXPAND') {
                    configHtml = `<div class="row">
                        <div><label>预设模板</label><select disabled><option>${PRESETS.EXPAND_BASIC.name}</option></select></div>
                        <div><label>防限流延迟(秒)</label><input type="number" value="${n.delaySec}" onchange="updateNode(${idx}, 'delaySec', parseInt(this.value))"></div>
                    </div>
                    <div><label>种子大纲 / Prompt</label><textarea rows="3" onchange="updateNode(${idx}, 'prompt', this.value)">${n.prompt}</textarea></div>`;
                } else if (n.type === 'GEN') {
                    configHtml = `<div class="row">
                        <div style="flex:2"><label>出题策略模板</label><select onchange="updateNode(${idx}, 'presetKey', this.value)">
                            ${Object.keys(PRESETS).filter(k=>k.startsWith('GEN_')).map(k => `<option value="${k}" ${n.presetKey === k ? 'selected' : ''}>${PRESETS[k].name}</option>`).join('')}
                        </select></div>
                        <div><label>目标题数</label><input type="number" value="${n.targetCount}" onchange="updateNode(${idx}, 'targetCount', parseInt(this.value))"></div>
                        <div><label>单批切割</label><input type="number" value="${n.chunkSize}" onchange="updateNode(${idx}, 'chunkSize', parseInt(this.value))"></div>
                        <div><label>重试限制</label><input type="number" value="${n.retryCount}" onchange="updateNode(${idx}, 'retryCount', parseInt(this.value))"></div>
                    </div>
                    <div><label>AI 指令 (可微调)</label><textarea rows="3" onchange="updateNode(${idx}, 'prompt', this.value)">${n.prompt}</textarea></div>`;
                } else if (n.type === 'MAP') {
                    configHtml = `<div class="row" style="background: rgba(155, 89, 182, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(155, 89, 182, 0.3);">
                        <div style="flex: 1.5"><label style="color:#9b59b6">投喂模式 (Payload)</label>
                            <select onchange="updateNode(${idx}, 'payloadMode', this.value)" style="border-color:#9b59b6">
                                <option value="SUMMARY" ${n.payloadMode === 'SUMMARY' ? 'selected' : ''}>摘要模式 (降维提取题号与题型，省 Token)</option>
                                <option value="FULL" ${n.payloadMode === 'FULL' ? 'selected' : ''}>全量模式 (连带解析全发，上帝视角，耗 Token)</option>
                            </select>
                        </div>
                        <div><label>切片起始</label><input type="text" placeholder="例 Q600001" value="${n.rangeStart || ''}" onchange="updateNode(${idx}, 'rangeStart', this.value)"></div>
                        <div><label>切片结束</label><input type="text" placeholder="例 Q600050" value="${n.rangeEnd || ''}" onchange="updateNode(${idx}, 'rangeEnd', this.value)"></div>
                        <div style="display:flex; align-items:flex-end;">
                            <button class="btn-blue" onclick="scanAllForMap(${idx})" style="padding: 10px; height: 38px;">🔍 一键扫全盘</button>
                        </div>
                    </div>
                    <div><label>附加教研指令</label><textarea rows="2" onchange="updateNode(${idx}, 'prompt', this.value)">${n.prompt}</textarea></div>`;
                }

                const ioHtml = `
                    <details class="io-panel">
                        <summary>🛠️ 监视器与沙盒 (I/O Inspector)</summary>
                        <div class="io-content">
                            <div><label>📥 节点数据入口 (Input)</label>
                                <textarea rows="3" readonly style="background:#111; color:#888;">${n.inputData || '运行时抓取...'}</textarea>
                            </div>
                            <div><label style="color:#58cc02;">📤 节点沙盒暂存区 (支持手动抢救修改！)</label>
                                <textarea rows="6" class="output-area" onchange="updateNode(${idx}, 'outputData', this.value)">${n.outputData}</textarea>
                            </div>
                            ${n.errorLog ? `<div style="color:#ff4b4b; font-size:12px; padding:5px; background:rgba(255,0,0,0.1); border-radius:4px;">🚨 ${n.errorLog}</div>` : ''}
                        </div>
                    </details>
                `;

                el.innerHTML = `
                    <div class="node-header">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <h3 style="margin:0; color:#fff; font-size:16px;">${idx + 1}. ${n.title}</h3>
                            <div class="status-badge status-${n.status}" id="badge-${n.id}">${n.status === 'IDLE' ? '💤 IDLE' : n.status === 'RUNNING' ? '⚙️ RUNNING' : n.status === 'SUCCESS' ? '✅ SUCCESS' : '❌ ERROR'}</div>
                        </div>
                        <div class="node-actions">
                            <button class="btn-green" onclick="runSingleNode(${idx})" id="btn-run-${n.id}">▶ 独立运行</button>
                            <button class="btn-blue" onclick="moveNode(${idx}, -1)" ${idx === 0 ? 'disabled' : ''}>▲</button>
                            <button class="btn-blue" onclick="moveNode(${idx}, 1)" ${idx === nodes.length-1 ? 'disabled' : ''}>▼</button>
                            <button class="btn-red" onclick="removeNode(${idx})">✖</button>
                        </div>
                    </div>
                    <div class="node-body">${configHtml}${ioHtml}</div>
                `;
                DOM.list.appendChild(el);
            });
        }

        // ==========================================
        // 💾 真正的完整数据格式：导出与导入 (Import/Export)
        // ==========================================
        function saveLocalCache() {
            localStorage.setItem('ht_v5_draft', JSON.stringify({ url: document.getElementById('apiUrl').value, model: document.getElementById('apiModel').value, key: document.getElementById('apiKey').value, delay: document.getElementById('apiDelay').value, nodes: nodes }));
        }

        function exportWorkflowFile() {
            // 导出时，剥离敏感信息 (API Key)
            const payload = {
                version: "5.3",
                engine: "Hardware Tower Generator",
                timestamp: Date.now(),
                globalConfig: { url: document.getElementById('apiUrl').value, model: document.getElementById('apiModel').value, delay: document.getElementById('apiDelay').value },
                nodes: nodes // 这里包含了所有节点的配置、Prompt 和生成的 outputData
            };
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }));
            a.download = `HardwareTower_Workflow_${new Date().getTime()}.htflow.json`;
            a.click();
            log("📦 工作流文件 (.htflow.json) 已生成并脱敏导出！", "success");
        }

        function importWorkflowFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.version || !data.nodes) throw new Error("无效的工作流文件格式！");
                    
                    document.getElementById('apiUrl').value = data.globalConfig.url || '';
                    document.getElementById('apiModel').value = data.globalConfig.model || '';
                    document.getElementById('apiDelay').value = data.globalConfig.delay || 3;
                    nodes = data.nodes;
                    
                    renderNodes(); saveLocalCache();
                    log(`📥 成功读取外来工作流！包含 ${nodes.length} 个节点，版本: v${data.version}`, "success");
                } catch (err) { alert("❌ 导入失败: " + err.message); }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset
        }

        function loadLocalCache() {
            const data = localStorage.getItem('ht_v5_draft');
            if(data) {
                const config = JSON.parse(data); document.getElementById('apiUrl').value = config.url || ''; document.getElementById('apiModel').value = config.model || ''; document.getElementById('apiKey').value = config.key || ''; document.getElementById('apiDelay').value = config.delay || 3;
                nodes = config.nodes || []; renderNodes(); log("已从浏览器缓存中恢复草稿。", "info");
            } else { addNode('EXPAND'); addNode('GEN'); addNode('MAP'); }
        }

        DOM.fileMd.addEventListener('change', e => {
            const r = new FileReader(); r.onload = ev => { 
                globalState.oldQuestions = ev.target.result; 
                const matches = [...globalState.oldQuestions.matchAll(/#\s*Q(\d+)/g)];
                if (matches.length > 0) { globalState.startQID = Math.max(...matches.map(m => parseInt(m[1]))) + 1; log(`基础题库载入，引擎起步题号重置为: Q${globalState.startQID}`);}
            }; r.readAsText(e.target.files[0]);
        });
        DOM.fileJson.addEventListener('change', e => {
            const r = new FileReader(); r.onload = ev => { 
                globalState.oldCampaign = JSON.parse(ev.target.result);
                if (globalState.oldCampaign.length > 0) { globalState.startLevelID = Math.max(...globalState.oldCampaign.map(n => n.id)) + 1; log(`基础地图载入，关卡ID起步重置为: ${globalState.startLevelID}`);}
            }; r.readAsText(e.target.files[0]);
        });

        loadLocalCache();
        // ==========================================
        // 🧰 核心引擎 1：高容错清洗与解析 (Robust Parser)
        // ==========================================
        function tryRescueJSON(str) {
            let cleaned = str.trim().replace(/^```json\n?/m, '').replace(/^```\n?/m, '').replace(/```$/m, '').trim();
            cleaned = cleaned.replace(/'/g, '"');
            cleaned = cleaned.replace(/,\s*\]/g, ']');
            return JSON.parse(cleaned);
        }

        function validateAndRescueFormat(text) {
            text = text.replace(/^```markdown\n?/m, '').replace(/^```\n?/m, '').replace(/```$/m, '').trim();
            const blocks = text.split('---').filter(b => b.trim().length > 10);
            if (blocks.length === 0) return { valid: false, error: "完全未找到 '---' 分隔符" };
            
            let rescuedText = "";
            for (let i = 0; i < blocks.length; i++) {
                let block = blocks[i];
                const typeMatch = block.match(/\[Type\]\s*(.*)/);
                if (!typeMatch) return { valid: false, error: `第 ${i+1} 题缺少 [Type] 标签` };
                
                try {
                    const t = typeMatch[1].trim();
                    if (t === 'BLANK_FILL') {
                        const optRaw = block.match(/\[Options\]([\s\S]*?)(?:\[Answer\])/)[1];
                        block = block.replace(optRaw, `\n${JSON.stringify(tryRescueJSON(optRaw))}\n`); 
                        const ansRaw = block.match(/\[Answer\]([\s\S]*?)(?:\n\[Explanation\]|$)/)[1];
                        block = block.replace(ansRaw, `\n${JSON.stringify(tryRescueJSON(ansRaw))}\n`);
                    } else if (t === 'COMPREHENSIVE') {
                        const kwRaw = block.match(/\[Keywords\]([\s\S]*?)(?:\[Answer\])/)[1];
                        block = block.replace(kwRaw, `\n${JSON.stringify(tryRescueJSON(kwRaw))}\n`);
                    } else if (t === 'MCQ') {
                        if (!block.match(/\[Options\]/) || !block.match(/\[Answer\]/)) throw new Error("MCQ 缺失 Options/Answer 字段");
                    }
                    rescuedText += `\n---\n${block.trim()}\n`;
                } catch (e) { return { valid: false, error: `第 ${i+1} 题解析抢救失败！题型: ${typeMatch[1].trim()}。原因: ${e.message}` }; }
            }
            return { valid: true, count: blocks.length, cleanText: rescuedText.trim() };
        }

        async function fetchLLM(messages) {
            let url = document.getElementById('apiUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('apiModel').value.trim();
            if (!url.endsWith('/chat/completions')) url = url.replace(/\/+$/, '') + '/chat/completions';

            const response = await fetch(url, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: model, messages: messages, temperature: 0.6 })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);
            const data = await response.json(); return data.choices[0].message.content;
        }

        // ==========================================
        // ✂️ 核心引擎 2：物理切片与降维摘要 (Slicing & Summarization)
        // ==========================================
        function extractMapPayload(node, idx) {
            let allBlocks = [];
            // 向上遍历所有成功的出题节点，提取原始 Markdown 文本块
            nodes.slice(0, idx).filter(n => n.type === 'GEN' && n.outputData).forEach(n => {
                const blocks = n.outputData.split('---').filter(b => b.trim().length > 10);
                allBlocks = allBlocks.concat(blocks);
            });

            if (allBlocks.length === 0) throw new Error("前方没有任何生成的题目数据！请先运行出题节点。");

            // 解析用户输入的起始与结束范围
            let startQ = node.rangeStart ? parseInt(node.rangeStart.replace(/\D/g, '')) : 0;
            let endQ = node.rangeEnd ? parseInt(node.rangeEnd.replace(/\D/g, '')) : 99999999;
            if (isNaN(startQ)) startQ = 0; if (isNaN(endQ)) endQ = 99999999;

            let filteredBlocks = [];
            let summaryList = [];

            // 核心割肉逻辑
            allBlocks.forEach(block => {
                const idMatch = block.match(/#\s*Q(\d+)/);
                if (!idMatch) return;
                const qNum = parseInt(idMatch[1]);
                
                if (qNum >= startQ && qNum <= endQ) {
                    filteredBlocks.push(`---\n${block.trim()}`);
                    
                    // 如果是摘要模式，降维提取三要素
                    if (node.payloadMode === 'SUMMARY') {
                        const typeMatch = block.match(/\[Type\]\s*(.*)/);
                        const topicMatch = block.match(/\[Topic\]\s*(.*)/);
                        summaryList.push({
                            id: `Q${qNum}`,
                            type: typeMatch ? typeMatch[1].trim() : "MCQ",
                            topic: topicMatch ? topicMatch[1].trim() : "未知主题"
                        });
                    }
                }
            });

            if (filteredBlocks.length === 0) throw new Error(`在设定的范围 (Q${startQ} ~ Q${endQ}) 内没有找到任何题目！`);

            // 返回包装好的 Payload
            if (node.payloadMode === 'SUMMARY') {
                return { type: 'SUMMARY', count: filteredBlocks.length, text: JSON.stringify(summaryList, null, 2) };
            } else {
                return { type: 'FULL', count: filteredBlocks.length, text: filteredBlocks.join('\n\n') };
            }
        }

        // ==========================================
        // 🚀 核心引擎 3：单点独立执行器 (Single Node Engine)
        // ==========================================
        let isEngineRunning = false;

        async function runSingleNode(idx) {
            if (isEngineRunning) return alert("系统正在运行其他节点，请等待！");
            const node = nodes[idx];
            if (!document.getElementById('apiKey').value) return alert("请填写 API Key！");

            isEngineRunning = true;
            DOM.btnStartAll.disabled = true;
            document.querySelectorAll('.node-actions button').forEach(b => b.disabled = true);
            
            updateNode(idx, 'status', 'RUNNING');
            updateNode(idx, 'errorLog', '');
            
            log(`[节点 ${idx+1}: ${node.title}] 启动引擎...`, 'stage');

            try {
                let contextInput = "";
                let payloadMeta = null;

                // --- 1. 动态摄取上下文 ---
                if (node.type === 'GEN') {
                    const expands = nodes.slice(0, idx).filter(n => n.type === 'EXPAND' && n.outputData.length > 0);
                    contextInput = expands.map(n => n.outputData).join('\n\n');
                    if(!contextInput) log("⚠️ 警告：当前节点上方没有扩写教材，AI 将依赖自身常识出题。", "warn");
                    updateNode(idx, 'inputData', `[捕获上方 ${expands.length} 个知识节点，长度: ${contextInput.length} 字符]`);
                } else if (node.type === 'MAP') {
                    // 🌟 呼叫物理切片引擎
                    payloadMeta = extractMapPayload(node, idx);
                    contextInput = payloadMeta.text;
                    
                    // 防爆保护：字符数过大警告
                    if (payloadMeta.type === 'FULL' && contextInput.length > 50000) {
                        const proceed = confirm(`⚠️ 警告：全量投喂的数据高达 ${contextInput.length} 个字符！\n如果您的模型（如非 128K 版本）不支持超长上下文，可能会直接报错或截断。\n\n是否继续发送？`);
                        if (!proceed) throw new Error("用户取消了超大 Payload 的发送。建议切换到摘要模式或缩小切片范围。");
                    }
                    
                    updateNode(idx, 'inputData', `[提取模式: ${payloadMeta.type}] 捕获有效题目 ${payloadMeta.count} 道。数据量: ${contextInput.length} 字符。`);
                }

                // --- 2. 执行 AI 通信 ---
                let retries = 0; let success = false; let finalOutput = "";
                
                while (retries < (node.retryCount || 1) && !success) {
                    let rawOutput = "";
                    try {
                        let sysPrompt = '你是一个极客架构师。'; let userPrompt = '';
                        
                        if (node.type === 'EXPAND') {
                            userPrompt = `用户大纲：\n${node.prompt}\n\n请扩充底层原理，字数 3000-5000 字。仅输出知识文稿，严禁出题。`;
                            finalOutput = await fetchLLM([{ role: 'system', content: sysPrompt }, { role: 'user', content: userPrompt }]);
                            success = true;
                        } 
                        else if (node.type === 'GEN') {
                            const STRICT_PROMPT = `你是一位极客教育专家。绝对禁止外层包裹markdown。必须严格按照 \`---\` 和 \`# Q题号\` 分隔。`;
                            
                            let calculatedStartQID = globalState.startQID;
                            nodes.slice(0, idx).filter(n => n.type === 'GEN').forEach(n => {
                                const m = [...n.outputData.matchAll(/#\s*Q(\d+)/g)];
                                if(m.length > 0) calculatedStartQID = Math.max(calculatedStartQID, Math.max(...m.map(x=>parseInt(x[1]))) + 1);
                            });

                            userPrompt = `【权威背景库】:\n${contextInput}\n\n${node.prompt}\n\n基于背景库，出 ${node.chunkSize} 道题。编号从 # Q${calculatedStartQID} 开始递增！`;
                            rawOutput = await fetchLLM([{ role: 'system', content: STRICT_PROMPT }, { role: 'user', content: userPrompt }]);
                            
                            const val = validateAndRescueFormat(rawOutput);
                            if (!val.valid) throw new Error(val.error);
                            finalOutput = (node.outputData + `\n\n${val.cleanText}`).trim();
                            success = true;
                        }
                        else if (node.type === 'MAP') {
                            sysPrompt = "你是一位只能输出合法 JSON 数组的极其严谨的教研总监。严禁输出任何 markdown 标记。";
                            let modeGuidance = payloadMeta.type === 'FULL' ? 
                                "以下是完整的试题原文库。请通读题干与解析，准确评估难度梯度。" : 
                                "以下是试题的摘要元数据。请根据 Topic 主题进行逻辑聚类。";
                                
                            userPrompt = `${modeGuidance}\n\n【题库数据】:\n${contextInput}\n\n【教研要求】:\n${node.prompt}\n新节点 ID 从 ${globalState.startLevelID} 开始递增。`;
                            
                            rawOutput = await fetchLLM([{ role: 'system', content: sysPrompt }, { role: 'user', content: userPrompt }]);
                            finalOutput = JSON.stringify(tryRescueJSON(rawOutput), null, 2);
                            
                            // 最终漏题校验
                            const parsedMap = JSON.parse(finalOutput);
                            let mappedQCount = 0;
                            parsedMap.forEach(level => { if(level.questions) mappedQCount += level.questions.length; });
                            if (mappedQCount < payloadMeta.count) {
                                log(`⚠️ AI 发生了漏题现象！送入 ${payloadMeta.count} 题，AI 仅编排了 ${mappedQCount} 题。请检查输出！`, 'warn');
                            }
                            
                            success = true;
                        }

                        log(`> 节点执行成功！`, 'success');
                    } catch (err) {
                        retries++; log(`> 节点崩溃重试 (${retries}/${node.retryCount}) 原因: ${err.message}`, 'error', rawOutput);
                        if (retries >= (node.retryCount || 1)) throw err;
                        if (node.delaySec) await delay(node.delaySec * 1000);
                    }
                }

                // --- 3. 收尾回写 ---
                updateNode(idx, 'outputData', finalOutput);
                updateNode(idx, 'status', 'SUCCESS');
                saveLocalCache();

            } catch (error) {
                log(`🚨 节点致命故障: ${error.message}`, 'error');
                updateNode(idx, 'status', 'ERROR');
                updateNode(idx, 'errorLog', error.message);
            } finally {
                isEngineRunning = false;
                DOM.btnStartAll.disabled = false;
                document.querySelectorAll('.node-actions button').forEach(b => b.disabled = false);
            }
        }

        // ==========================================
        // 🔄 宏观调度器与资产缝合打包
        // ==========================================
        async function runAllNodes() {
            log("🚀 流水线启动，开始扫描未完成节点...", "stage");
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].status !== 'SUCCESS') {
                    if (i > 0 && nodes[i].delaySec) { log(`⏱️ 节点冷却，等待 ${nodes[i].delaySec} 秒...`); await delay(nodes[i].delaySec * 1000); }
                    await runSingleNode(i);
                    if (nodes[i].status === 'ERROR') {
                        log(`⛔ 流水线因节点 ${i+1} 致命错误熔断。`, "error"); return;
                    }
                } else { log(`⏭️ 节点 ${i+1} 已完成，跳过。`); }
            }
            log(`🎉 全线执行完毕！游戏资产准备就绪！`, "success");
            DOM.btnDownload.style.display = 'block';
        }

        function downloadArtifacts() {
            // 缝合所有题库
            let combinedQuestions = globalState.oldQuestions;
            nodes.filter(n => n.type === 'GEN' && n.status === 'SUCCESS').forEach(n => {
                combinedQuestions += `\n\n${n.outputData}\n`;
            });
            const aMd = document.createElement('a'); 
            aMd.href = URL.createObjectURL(new Blob([combinedQuestions.trim()], { type: 'text/markdown' })); 
            aMd.download = `new_questions.md`; aMd.click();
            
            // 缝合战役地图 (支持多 MAP 节点追加)
            let finalCamp = [...globalState.oldCampaign];
            const mapNodes = nodes.filter(n => n.type === 'MAP' && n.status === 'SUCCESS');
            
            mapNodes.forEach(mapNode => {
                try {
                    const newNodes = JSON.parse(mapNode.outputData);
                    const idx = finalCamp.findIndex(n => n.type === 'LOCKED');
                    if (idx !== -1) { 
                        finalCamp.splice(idx, 0, ...newNodes); 
                        finalCamp[finalCamp.length - 1].id = finalCamp[finalCamp.length - 2].id + 1; 
                    } else { finalCamp = finalCamp.concat(newNodes); }
                } catch(e) { alert("部分地图 JSON 损坏跳过缝合！"); }
            });
            
            const aJson = document.createElement('a'); 
            aJson.href = URL.createObjectURL(new Blob([JSON.stringify(finalCamp, null, 2)], { type: 'application/json' })); 
            aJson.download = `new_campaign.json`; aJson.click();
        }
    </script>
</body>
