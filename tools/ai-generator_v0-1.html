<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>硬件通天塔 - 可视化工作流引擎 V4.0 (高容错版)</title>
    <style>
        body { margin: 0; padding: 20px; background: #121212; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        h1, h2, h3, h4 { color: #1cb0f6; margin-top: 0; }
        .container { max-width: 1500px; margin: 0 auto; display: flex; gap: 20px; align-items: flex-start;}
        .panel { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .left-panel { flex: 1.2; }
        .right-panel { flex: 1; position: sticky; top: 20px; }
        .terminal { background: #0a0a0a; border: 2px solid #58cc02; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 13px; color: #58cc02; overflow-y: auto; height: 750px; line-height: 1.5; box-shadow: inset 0 0 10px rgba(88,204,2,0.2); word-wrap: break-word; white-space: pre-wrap; }
        label { font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 4px; display: block; }
        input, textarea, select { background: #111; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: inherit; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #1cb0f6; }
        button { background: #9b59b6; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 0 #732d91; }
        button:hover { transform: translateY(2px); box-shadow: 0 2px 0 #732d91; }
        button:disabled { background: #555; box-shadow: 0 4px 0 #333; cursor: not-allowed; color: #888; transform: none; }
        .btn-green { background: #58cc02; box-shadow: 0 4px 0 #46a302; } .btn-green:hover { box-shadow: 0 2px 0 #46a302; }
        .btn-blue { background: #1cb0f6; box-shadow: 0 4px 0 #1899d6; } .btn-blue:hover { box-shadow: 0 2px 0 #1899d6; }
        .btn-red { background: #ff4b4b; box-shadow: 0 4px 0 #cc3c3c; } .btn-red:hover { box-shadow: 0 2px 0 #cc3c3c; }
        .row { display: flex; gap: 15px; align-items: flex-end; } .row > div { flex: 1; }
        
        .workflow-container { display: flex; flex-direction: column; gap: 10px; padding: 15px; background: #111; border: 1px dashed #555; border-radius: 8px; min-height: 100px;}
        .module-card { background: #2a2a2a; border-left: 4px solid #1cb0f6; border-radius: 6px; padding: 15px; display: flex; flex-direction: column; gap: 10px; position: relative; }
        .module-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .module-actions button { padding: 4px 8px; font-size: 12px; margin-left: 5px; box-shadow: none; border-radius: 4px;}
        .module-active { border-left-color: #58cc02; box-shadow: 0 0 15px rgba(88,204,2,0.3); }

        .log-error { color: #ff4b4b; } .log-warn { color: #ffc800; } .log-success { color: #1cb0f6; } .log-stage { color: #9b59b6; font-weight: bold; font-size: 14px; margin-top: 15px; border-bottom: 1px dashed #9b59b6; padding-bottom: 5px; }
        .raw-dump { background: #222; color: #aaa; padding: 10px; border-radius: 4px; border-left: 3px solid #ff4b4b; font-size: 12px; margin-top: 5px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1 style="text-align: center; text-transform: uppercase; letter-spacing: 2px;">⚙️ 通天塔 AI 节点化生产线 V4.0 (容错版)</h1>

    <div class="container">
        <div class="panel left-panel">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>1. 全局环境与 API 设定</h2>
                <div>
                    <button class="btn-blue" onclick="saveConfig()">💾 保存工作流</button>
                    <button class="btn-blue" onclick="loadConfig()">📂 读取工作流</button>
                </div>
            </div>
            
            <div class="row">
                <div><label>API Base URL</label><input type="text" id="apiUrl" value="[https://api.deepseek.com/v1/chat/completions](https://api.deepseek.com/v1/chat/completions)"></div>
                <div><label>模型名称 (Model)</label><input type="text" id="apiModel" value="deepseek-chat"></div>
                <div><label>API Key</label><input type="password" id="apiKey" placeholder="sk-..."></div>
            </div>

            <div class="row">
                <div><label>⏱️ 请求冷却延迟 (秒)</label><input type="number" id="apiDelay" value="3" min="0" max="60"></div>
                <div><label>导入旧题库 (.md)</label><input type="file" id="fileMd" accept=".md" style="padding: 6px;"></div>
                <div><label>导入旧地图 (.json)</label><input type="file" id="fileJson" accept=".json" style="padding: 6px;"></div>
            </div>

            <div>
                <label>📚 全局种子知识点 (作为各模块的统一前置教材)</label>
                <textarea id="seedKnowledge" rows="3" placeholder="例如：LDO原理、运放选型、走线阻抗匹配..."></textarea>
            </div>

            <hr style="border: 0; border-top: 1px solid #333; margin: 5px 0;">

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>2. 生产流水线构建</h2>
                <button class="btn-green" onclick="addModule()">➕ 添加生产模块</button>
            </div>

            <div class="workflow-container" id="workflowList"></div>

            <button id="btnStart" class="btn-green" style="padding: 15px; font-size: 18px; margin-top: 10px;" onclick="startPipeline()">🚀 点火执行工作流</button>
            <button id="btnDownload" class="btn-blue" style="display: none; padding: 15px; font-size: 18px;" onclick="downloadArtifacts()">📥 下载打包游戏资产 (.md + .json)</button>
        </div>

        <div class="panel right-panel">
            <h2>🖥️ 运行监控终端</h2>
            <div class="terminal" id="terminal">
                <div>[System] 高容错节点化引擎就绪。一旦AI返回错误格式，将触发自动抢救机制。</div>
                <div style="color: #555;">===========================================================</div>
            </div>
        </div>
    </div>

    <script>
        // 预设的专业级 Prompt 模板
        const PRESETS = {
            "concept": {
                name: "阶段一：基础概念篇 (做中学)",
                prompt: "【指令：执行阶段一（基础概念篇）】\n目标：让初学者在做题中“初次接触”并记忆名词、逻辑关系。重点是学习，而不是考倒。\n设计指导：把完整的背景知识、定义直接写在 [Prompt] 题干里，当成小教程。然后在末尾提一个简单的验证性问题。推荐题型：MCQ (单选) 或简单的 BLANK_FILL。"
            },
            "direct": {
                name: "阶段二：直接提问篇 (地毯式测试)",
                prompt: "【指令：执行阶段二（直接提问篇）】\n目标：地毯式覆盖所有知识点，进行直接的记忆和理解测试。\n设计指导：直奔主题，如“LDO的核心痛点是什么？”。选项清晰明了，干扰项为明显的常识错误。推荐题型：MCQ (单选)。"
            },
            "trap": {
                name: "阶段三：提高与陷阱篇 (多空交叉)",
                prompt: "【指令：执行阶段三（提高与陷阱篇）】\n目标：锻炼在易混淆概念中的辨错能力。\n设计指导：曲折提问，描述现象让做题者判断。混淆视听，大量使用相似名词作干扰项（如压降与纹波）。多因素挖空：在 BLANK_FILL 中挖去3-4个关键节点，提供7-10个选项的词汇池，要求按顺序填入。"
            },
            "calc": {
                name: "阶段四：复杂计算拆解篇 (分步降维)",
                prompt: "【指令：执行阶段四（复杂计算拆解篇）】\n目标：训练对复杂公式的运用。\n设计指导：参数隐藏与推导，题干不直接给全参数，要求从间接信息中推导。计算降维拆解，将复杂公式拆成连续的几道题分别计算不同原子步骤。推荐题型：MATH 或 计算类 MCQ。"
            },
            "comp": {
                name: "阶段五：真实工程交叉沙盘篇 (架构级)",
                prompt: "【指令：执行阶段五（真实工程交叉沙盘篇）】\n目标：考核全盘系统设计与复杂 Debug 能力。\n设计指导：题干必须极长(>200字)，模拟真实职场环境的多因素耦合故障。隐藏致命线索（如一根60cm的杜邦线）。推荐题型：COMPREHENSIVE (沙盘题)，必须配置精准的 Keywords 用于本地判分。"
            },
            "custom": {
                name: "自定义指令 (Custom)",
                prompt: "【指令：自定义】\n请根据以下具体要求出题：\n"
            }
        };

        // 🌟 史诗级防幻觉系统指令
        const SYSTEM_PROMPT = `# 🌟 Role Definition
你是一位「首席硬件系统架构师」兼「顶尖极客教育专家」。

# ⚠️ 绝对严格的机器解析输出规则 (CRITICAL FAIL IF VIOLATED)
你的输出将直接喂给一套非常脆弱的 JavaScript 正则引擎。你必须表现得像一台精准的打印机！
1. **绝对禁止 markdown 污染**：不准在输出的最外层、或者任何选项列表周围使用 \`\`\`json 或 \`\`\`markdown！直接输出纯文本！
2. **严禁使用单引号**：在 [Options], [Answer], [Keywords] 中的 JSON 数组里，绝对不准用单引号 (')，必须严格使用双引号 (")！
3. **严禁尾随逗号**：JSON 数组的最后一个元素后面绝对不准有逗号！(例如 ["A", "B",] 是致命错误，必须是 ["A", "B"])
4. **分隔符**：每道题必须且只能以单独的一行 \`---\` 作为开始，紧接着是 \`# Q题号\`。

### 合法模板参考 (必须1比1模仿格式)：

---
# Q100001
[Type] MCQ
[Topic] 简短主题
[Prompt] 题干描述...
[Options]
A. 选项描述1
B. 选项描述2
C. 选项描述3
D. 选项描述4
[Answer] AB
[Explanation] 深度解析...

---
# Q200001
[Type] MATH
[Topic] 简短主题
[Prompt] 计算题干...
[Answer] 1 + \\frac{R2}{R1}
[Explanation] 解析里公式不要用 $$。

---
# Q300001
[Type] BLANK_FILL
[Topic] 逻辑推演序列
[Prompt] 题干，包含【空1】和【空2】。
[Options]
[ "干扰项A", "正确项B", "正确项C", "易混淆项D" ]
[Answer]
[ "正确项B", "正确项C" ]
[Explanation] 解析...

---
# Q400001
[Type] COMPREHENSIVE
[Topic] 复杂架构 Debug
[Prompt] 极度详尽的工程现场、故障现象、隐含陷阱描述...
[Keywords]
[ "核心术语1", "核心术语2" ]
[Answer] 绝对标准答案的长文本报告。
[Explanation] 解析...`;

        const DOM = {
            list: document.getElementById('workflowList'), term: document.getElementById('terminal'),
            btnStart: document.getElementById('btnStart'), btnDownload: document.getElementById('btnDownload'),
            fileMd: document.getElementById('fileMd'), fileJson: document.getElementById('fileJson')
        };

        let workflow = [];
        let state = { oldQuestions: "", oldCampaign: [], newQuestions: "", newCampaignNodes: [], startQID: 600001, startLevelID: 0, expandedContext: "" };
        // 核心渲染函数：根据数据重新渲染工作流UI
        function renderWorkflow() {
            DOM.list.innerHTML = '';
            if(workflow.length === 0) {
                DOM.list.innerHTML = '<div style="color:#666; text-align:center; padding: 20px;">工作流为空。请点击上方按钮添加模块。</div>';
                return;
            }

            workflow.forEach((mod, index) => {
                const el = document.createElement('div');
                el.className = `module-card ${mod.isTextOnly ? '' : 'module-active'}`;
                el.id = `mod-ui-${mod.id}`;
                // 纯文本模式样式弱化
                if(mod.isTextOnly) el.style.borderLeftColor = '#ffc800'; 

                el.innerHTML = `
                    <div class="module-header">
                        <h4 style="margin:0; color:${mod.isTextOnly ? '#ffc800' : '#fff'};">📦 模块 ${index + 1} ${mod.isTextOnly ? '(教材扩写)' : '(批量出题)'}</h4>
                        <div class="module-actions">
                            <button class="btn-blue" onclick="moveModule(${index}, -1)" ${index === 0 ? 'disabled' : ''}>▲ 上移</button>
                            <button class="btn-blue" onclick="moveModule(${index}, 1)" ${index === workflow.length-1 ? 'disabled' : ''}>▼ 下移</button>
                            <button class="btn-red" onclick="removeModule(${index})">✖ 删除</button>
                        </div>
                    </div>
                    <div class="row">
                        <div>
                            <label>预设出题策略</label>
                            <select onchange="updateModule(${index}, 'presetKey', this.value)">
                                ${Object.keys(PRESETS).map(k => `<option value="${k}" ${mod.presetKey === k ? 'selected' : ''}>${PRESETS[k].name}</option>`).join('')}
                            </select>
                        </div>
                        <div style="flex: 0.5">
                            <label>目标生成总数</label>
                            <input type="number" value="${mod.targetCount}" onchange="updateModule(${index}, 'targetCount', this.value)" min="1" ${mod.isTextOnly ? 'disabled' : ''}>
                        </div>
                        <div style="flex: 0.5">
                            <label>单批切割数</label>
                            <input type="number" value="${mod.chunkSize}" onchange="updateModule(${index}, 'chunkSize', this.value)" min="1" max="10" ${mod.isTextOnly ? 'disabled' : ''}>
                        </div>
                        <div style="flex: 0.6; display: flex; align-items: center; justify-content: center;">
                            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color: #ffc800; border: 1px solid #ffc800; padding: 8px; border-radius: 6px; background: rgba(255,200,0,0.1);">
                                <input type="checkbox" onchange="updateModule(${index}, 'isTextOnly', this.checked)" ${mod.isTextOnly ? 'checked' : ''} style="width: 16px;">
                                <span>纯文本扩写<br>(不出题)</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label>AI 角色指令 (可基于预设自由微调)</label>
                        <textarea rows="4" onchange="updateModule(${index}, 'customPrompt', this.value)">${mod.customPrompt}</textarea>
                    </div>
                `;
                DOM.list.appendChild(el);
            });
        }

        // 模块操作与持久化
        function addModule() { workflow.push({ id: Date.now(), presetKey: 'concept', targetCount: 10, chunkSize: 5, customPrompt: PRESETS['concept'].prompt, isTextOnly: false }); renderWorkflow(); }
        function removeModule(idx) { workflow.splice(idx, 1); renderWorkflow(); }
        function moveModule(idx, dir) { const temp = workflow[idx]; workflow[idx] = workflow[idx + dir]; workflow[idx + dir] = temp; renderWorkflow(); }
        function updateModule(idx, key, val) {
            if (key === 'targetCount' || key === 'chunkSize') val = parseInt(val);
            workflow[idx][key] = val;
            if (key === 'presetKey') workflow[idx].customPrompt = PRESETS[val].prompt;
            renderWorkflow(); 
        }

        function saveConfig() {
            const config = { url: document.getElementById('apiUrl').value, model: document.getElementById('apiModel').value, key: document.getElementById('apiKey').value, seed: document.getElementById('seedKnowledge').value, delay: document.getElementById('apiDelay').value, flow: workflow };
            localStorage.setItem('ht_workflow_config_v4', JSON.stringify(config));
            log("工作流与全局配置已永久保存！", "success"); alert("保存成功！");
        }
        
        function loadConfig() {
            const data = localStorage.getItem('ht_workflow_config_v4');
            if(data) {
                const config = JSON.parse(data);
                document.getElementById('apiUrl').value = config.url || ''; document.getElementById('apiModel').value = config.model || '';
                document.getElementById('apiKey').value = config.key || ''; document.getElementById('seedKnowledge').value = config.seed || '';
                document.getElementById('apiDelay').value = config.delay || 3;
                workflow = config.flow || []; renderWorkflow(); log("已成功恢复本地工作流状态！", "info");
            } else { log("本地无保存的配置记录。", "warn"); }
        }

        loadConfig(); if(workflow.length === 0) addModule();

        // 终端日志
        function log(msg, type = 'info', rawDump = null) {
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            if (type === 'error') { div.className = 'log-error'; msg = `[ERROR] ${msg}`; }
            else if (type === 'warn') { div.className = 'log-warn'; msg = `[WARN] ${msg}`; }
            else if (type === 'success') { div.className = 'log-success'; msg = `[SUCCESS] ${msg}`; }
            else if (type === 'stage') { div.className = 'log-stage'; msg = `>> ${msg}`; }
            else msg = `[INFO] ${msg}`;
            
            div.innerText = `[${time}] ${msg}`;
            
            // 🚨 如果附带了原始崩溃数据，渲染一个高亮的 Dump 框
            if (rawDump) {
                const dumpDiv = document.createElement('div');
                dumpDiv.className = 'raw-dump';
                dumpDiv.innerText = `👇 AI 返回的原始脏数据 (Raw Dump):\n${rawDump}`;
                div.appendChild(dumpDiv);
            }

            DOM.term.appendChild(div); DOM.term.scrollTop = DOM.term.scrollHeight;
        }
        const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

        // 🧠 LLM 请求引擎 (带 URL 防呆补全)
        async function fetchLLM(messages) {
            let url = document.getElementById('apiUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('apiModel').value.trim();
            if (!url.endsWith('/chat/completions')) url = url.replace(/\/+$/, '') + '/chat/completions';

            const response = await fetch(url, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: model, messages: messages, temperature: 0.6 })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);
            const data = await response.json(); return data.choices[0].message.content;
        }

        // 🧰 高容错解析与抢救引擎 (Robust Parser)
        function tryRescueJSON(str) {
            let cleaned = str.trim();
            // 抢救1：去除可能包裹的 markdown 标记
            cleaned = cleaned.replace(/^```json\n?/m, '').replace(/^```\n?/m, '').replace(/```$/m, '').trim();
            // 抢救2：处理单引号变双引号 (粗略替换，防呆)
            cleaned = cleaned.replace(/'/g, '"');
            // 抢救3：去除数组最后的致命尾随逗号 (如 ["A", "B",] -> ["A", "B"])
            cleaned = cleaned.replace(/,\s*\]/g, ']');
            return JSON.parse(cleaned);
        }

        function validateAndRescueFormat(text) {
            // 首先强力清洗 AI 可能在外层包裹的 Markdown 标记
            text = text.replace(/^```markdown\n?/m, '').replace(/^```\n?/m, '').replace(/```$/m, '').trim();

            const blocks = text.split('---').filter(b => b.trim().length > 10);
            if (blocks.length === 0) return { valid: false, error: "完全未找到 '---' 分隔符" };
            
            let rescuedText = "";

            for (let i = 0; i < blocks.length; i++) {
                let block = blocks[i];
                const typeMatch = block.match(/\[Type\]\s*(.*)/);
                if (!typeMatch) return { valid: false, error: `第 ${i+1} 题缺少 [Type] 标签` };
                
                try {
                    const t = typeMatch[1].trim();
                    
                    // 1. 完形填空 (BLANK_FILL) 的 Options 和 Answer 是严格的 JSON 数组
                    if (t === 'BLANK_FILL') {
                        const optRaw = block.match(/\[Options\]([\s\S]*?)(?:\[Answer\])/)[1];
                        const validOpts = tryRescueJSON(optRaw);
                        block = block.replace(optRaw, `\n${JSON.stringify(validOpts)}\n`); 

                        const ansRaw = block.match(/\[Answer\]([\s\S]*?)(?:\n\[Explanation\]|$)/)[1];
                        const validAns = tryRescueJSON(ansRaw);
                        block = block.replace(ansRaw, `\n${JSON.stringify(validAns)}\n`);
                    } 
                    // 2. 综合沙盘 (COMPREHENSIVE) 的 Keywords 是严格的 JSON 数组
                    else if (t === 'COMPREHENSIVE') {
                        const kwRaw = block.match(/\[Keywords\]([\s\S]*?)(?:\[Answer\])/)[1];
                        const validKw = tryRescueJSON(kwRaw);
                        block = block.replace(kwRaw, `\n${JSON.stringify(validKw)}\n`);
                    }
                    // 3. 选择题 (MCQ) 和 数学题 (MATH) 的选项是纯文本，跳过 JSON 校验！
                    else if (t === 'MCQ') {
                        if (!block.match(/\[Options\]/) || !block.match(/\[Answer\]/)) {
                            throw new Error("MCQ 题型缺失 [Options] 或 [Answer] 字段");
                        }
                    }

                    rescuedText += `\n---\n${block.trim()}\n`;
                } catch (e) { 
                    // 彻底抢救失败，抛出明确错误
                    return { valid: false, error: `第 ${i+1} 题解析与抢救均失败！题型: ${typeMatch[1].trim()}。原因: ${e.message}` }; 
                }
            }
            return { valid: true, count: blocks.length, cleanText: rescuedText.trim() };
        }

        // 文件读取
        DOM.fileMd.addEventListener('change', e => {
            const r = new FileReader(); r.onload = ev => { 
                state.oldQuestions = ev.target.result; 
                const matches = [...state.oldQuestions.matchAll(/#\s*Q(\d+)/g)];
                if (matches.length > 0) { state.startQID = Math.max(...matches.map(m => parseInt(m[1]))) + 1; log(`旧题库接入，新题号自动指派为: Q${state.startQID}`);}
            }; r.readAsText(e.target.files[0]);
        });
        DOM.fileJson.addEventListener('change', e => {
            const r = new FileReader(); r.onload = ev => { 
                state.oldCampaign = JSON.parse(ev.target.result);
                if (state.oldCampaign.length > 0) { state.startLevelID = Math.max(...state.oldCampaign.map(n => n.id)) + 1; log(`旧地图接入，新关卡ID指派为: ${state.startLevelID}`);}
            }; r.readAsText(e.target.files[0]);
        });

        // 🚀 核心流水线引擎
        async function startPipeline() {
            if(workflow.length === 0) return alert("工作流为空！请先添加生产模块！");
            const seed = document.getElementById('seedKnowledge').value;
            if(!seed) return alert("请填写全局种子知识点！");
            
            const delaySec = parseInt(document.getElementById('apiDelay').value) || 0;

            DOM.btnStart.disabled = true; DOM.btnStart.innerText = "🚧 高容错集群满载运转中...";
            state.newQuestions = ""; state.newCampaignNodes = [];
            let currentQID = state.startQID; let batchIDs = [];

            try {
                // 阶段 0: 全局知识扩写
                log(`[启动] 开始全局知识扩写 (Context Expansion)...`, 'stage');
                const expandPrompt = `用户核心痛点/提纲：\n${seed}\n\n请以资深硬件总监身份，扩充这部分知识的底层原理、寄生参数陷阱、PCB布线取舍。要求极度深入，字数 3000-5000 字。仅输出知识文稿，严禁出任何题目。`;
                state.expandedContext = await fetchLLM([{ role: 'system', content: '你是技术作书机器。' }, { role: 'user', content: expandPrompt }]);
                log(`全局初始知识域扩写完毕！(长度: ${state.expandedContext.length} 字符)`, 'success');

                // 阶段 1..N: 执行各个模块
                for (let i = 0; i < workflow.length; i++) {
                    const mod = workflow[i];
                    document.querySelectorAll('.module-card').forEach(c => c.classList.remove('module-active'));
                    document.getElementById(`mod-ui-${mod.id}`).classList.add('module-active');
                    
                    log(`[模块 ${i+1}/${workflow.length}] 启动策略: ${PRESETS[mod.presetKey]?.name || '自定义'} | 目标产量: ${mod.isTextOnly ? '纯文本模式' : mod.targetCount + '题'}`, 'stage');

                    // ==========================================
                    // 🌟 纯文本扩写拦截器
                    // ==========================================
                    if (mod.isTextOnly) {
                        if (delaySec > 0 && i > 0) { log(`⏱️ 触发冷却，等待 ${delaySec} 秒...`, 'warn'); await delay(delaySec * 1000); }
                        log(`> 发送模块扩写指令 (免检模式)...`);
                        let retries = 0; let success = false;
                        while (retries < 3 && !success) {
                            try {
                                const prompt = `【当前权威背景库】:\n${state.expandedContext}\n\n${mod.customPrompt}\n\n⚠️ 绝对禁止生成测试题！仅输出扩充的教材文本。`;
                                const raw = await fetchLLM([{ role: 'system', content: '你是技术作书机器。' }, { role: 'user', content: prompt }]);
                                state.expandedContext += `\n\n=== 模块追加知识 ===\n${raw}\n\n`;
                                success = true;
                                log(`> 知识扩充成功！已注入全局记忆库。`, 'success');
                            } catch(err) {
                                retries++; log(`> 扩写失败重试(${retries}/3): ${err.message}`, 'error');
                                if (retries >= 3) throw new Error(`纯文本扩写彻底失败，模块 ${i+1}`);
                            }
                        }
                        continue; 
                    }

                    // ==========================================
                    // 🌟 标准出题拦截器
                    // ==========================================
                    let generatedInMod = 0;
                    while (generatedInMod < mod.targetCount) {
                        const need = Math.min(mod.chunkSize, mod.targetCount - generatedInMod);
                        
                        if (delaySec > 0 && (i > 0 || generatedInMod > 0)) {
                            log(`⏱️ API 请求冷却，等待 ${delaySec} 秒...`, 'warn');
                            await delay(delaySec * 1000);
                        }

                        log(`> 发送生产指令: 索取 ${need} 题...`);
                        
                        let retries = 0; let success = false;
                        while (retries < 10 && !success) {
                            let rawOutput = "";
                            try {
                                const prompt = `【权威背景库】:\n${state.expandedContext}\n\n${mod.customPrompt}\n\n请严格基于背景库，出 ${need} 道题。这批题目的编号请严格从 # Q${currentQID} 开始递增！严格遵守格式！不准加 \`\`\`markdown！`;
                                rawOutput = await fetchLLM([{ role: 'system', content: SYSTEM_PROMPT }, { role: 'user', content: prompt }]);
                                
                                // 呼叫高容错清洗器
                                const val = validateAndRescueFormat(rawOutput);
                                if (!val.valid) throw new Error(val.error);
                                
                                state.newQuestions += `\n\n${val.cleanText}\n`;
                                [...val.cleanText.matchAll(/#\s*Q(\d+)/g)].forEach(m => batchIDs.push(`Q${m[1]}`));
                                
                                currentQID += val.count; generatedInMod += val.count; success = true;
                                log(`> 质检与抢救成功 (+${val.count}题)！当前模块进度: ${generatedInMod} / ${mod.targetCount}`, 'success');
                            
                            } catch (err) {
                                retries++; 
                                // 🚨 打印极其详细的崩溃日志和原始 Dump
                                log(`> 格式损坏或网络崩溃 (${retries}/10) 原因: ${err.message}`, 'error', rawOutput);
                                if (retries >= 10) throw new Error(`连续打回，流水线卡死在 模块 ${i+1}`);
                            }
                        }
                    }
                    document.getElementById(`mod-ui-${mod.id}`).classList.remove('module-active');
                }

                // 终点站: 地图编排
                if (batchIDs.length > 0) {
                    if (delaySec > 0) { log(`⏱️ 等待 ${delaySec} 秒准备编排地图...`, 'warn'); await delay(delaySec * 1000); }
                    log(`[终极统筹] 呼叫架构师进行战役地图编排...`, 'stage');
                    const mapPrompt = `题库已就绪：${JSON.stringify(batchIDs)}\n请组织成游戏地图。划分为若干 LESSON，节点间插入 1 个 CHEST。新节点 ID 严格从 ${state.startLevelID} 开始递增。\n必须严格输出纯 JSON 数组，无markdown标记。`;
                    const rawMap = await fetchLLM([{ role: 'user', content: mapPrompt }]);
                    const cleanMap = rawMap.replace(/^```json\n?/m, '').replace(/^```\n?/m, '').replace(/```$/m, '').trim();
                    state.newCampaignNodes = JSON.parse(cleanMap);
                    log(`战役编排成功！共生成 ${state.newCampaignNodes.length} 个新关卡节点。`, 'success');
                } else {
                    log(`本次工作流未生成任何新题目，跳过地图编排。`, 'warn');
                }

                log(`🎉 工业集群全线停机。资产打包就绪！`, 'success');
                DOM.btnDownload.style.display = 'block';
                DOM.btnStart.innerText = "✅ 生产完成！可下载";

            } catch (error) {
                log(`🚨 生产线发生灾难性事故：${error.message}`, 'error');
                DOM.btnStart.disabled = false; DOM.btnStart.innerText = "❌ 修复后重新点火";
            }
        }

        // 打包下载机制
        function downloadArtifacts() {
            if (state.newQuestions.trim().length > 0) {
                const aMd = document.createElement('a'); 
                aMd.href = URL.createObjectURL(new Blob([(state.oldQuestions.trim() + "\n\n" + state.newQuestions.trim()).trim()], { type: 'text/markdown' })); 
                aMd.download = `new_questions.md`; aMd.click();
            }
            
            if (state.newCampaignNodes.length > 0) {
                let finalCamp = [...state.oldCampaign];
                const idx = finalCamp.findIndex(n => n.type === 'LOCKED');
                if (idx !== -1) { finalCamp.splice(idx, 0, ...state.newCampaignNodes); finalCamp[finalCamp.length - 1].id = finalCamp[finalCamp.length - 2].id + 1; } 
                else finalCamp = finalCamp.concat(state.newCampaignNodes);
                
                const aJson = document.createElement('a'); 
                aJson.href = URL.createObjectURL(new Blob([JSON.stringify(finalCamp, null, 2)], { type: 'application/json' })); 
                aJson.download = `new_campaign.json`; aJson.click();
            }
        }
    </script>
</body>
